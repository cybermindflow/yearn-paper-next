<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Title -->
  <text x="200" y="30" font-family="Arial" font-size="15" text-anchor="middle" font-weight="bold" fill="black">句子結構分析</text>
  <!-- Example sentence -->
  <text x="200" y="70" font-family="Arial" font-size="18" text-anchor="middle" fill="black">小明 在公園 跑步。</text>
  <!-- Brackets under each part -->
  <!-- Subject bracket -->
  <line x1="90" y1="80" x2="90" y2="92" stroke="black" stroke-width="2"/>
  <line x1="90" y1="92" x2="130" y2="92" stroke="black" stroke-width="2"/>
  <line x1="130" y1="92" x2="130" y2="80" stroke="black" stroke-width="2"/>
  <text x="110" y="110" font-family="Arial" font-size="13" text-anchor="middle" fill="black">主語</text>
  <text x="110" y="127" font-family="Arial" font-size="11" text-anchor="middle" fill="black">（誰）</text>
  <!-- Adverbial bracket -->
  <line x1="138" y1="80" x2="138" y2="92" stroke="black" stroke-width="2"/>
  <line x1="138" y1="92" x2="210" y2="92" stroke="black" stroke-width="2"/>
  <line x1="210" y1="92" x2="210" y2="80" stroke="black" stroke-width="2"/>
  <text x="174" y="110" font-family="Arial" font-size="13" text-anchor="middle" fill="black">狀語</text>
  <text x="174" y="127" font-family="Arial" font-size="11" text-anchor="middle" fill="black">（在哪裡）</text>
  <!-- Predicate bracket -->
  <line x1="218" y1="80" x2="218" y2="92" stroke="black" stroke-width="2"/>
  <line x1="218" y1="92" x2="278" y2="92" stroke="black" stroke-width="2"/>
  <line x1="278" y1="92" x2="278" y2="80" stroke="black" stroke-width="2"/>
  <text x="248" y="110" font-family="Arial" font-size="13" text-anchor="middle" fill="black">謂語</text>
  <text x="248" y="127" font-family="Arial" font-size="11" text-anchor="middle" fill="black">（做什麼）</text>
  <!-- Second example -->
  <text x="200" y="175" font-family="Arial" font-size="16" text-anchor="middle" fill="black">句子 = 主語 ＋ 謂語 ＋ 賓語</text>
  <rect x="60" y="185" width="280" height="60" rx="8" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="200" y="210" font-family="Arial" font-size="13" text-anchor="middle" fill="black">例：小貓（主語）吃（謂語）魚（賓語）。</text>
  <text x="200" y="235" font-family="Arial" font-size="12" text-anchor="middle" fill="black">→ 誰 ＋ 做什麼 ＋ 對象</text>
  <text x="200" y="285" font-family="Arial" font-size="12" text-anchor="middle" fill="black">句子結構分析示意</text>
</svg>
