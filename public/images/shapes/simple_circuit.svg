<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Circuit wires (rectangle loop) -->
  <polyline points="60,80 60,220 340,220 340,80 60,80" fill="none" stroke="black" stroke-width="2"/>
  <!-- Battery (left side, vertical) -->
  <line x1="60" y1="120" x2="60" y2="140" stroke="black" stroke-width="4"/>
  <line x1="50" y1="130" x2="70" y2="130" stroke="black" stroke-width="2"/>
  <line x1="55" y1="145" x2="65" y2="145" stroke="black" stroke-width="3"/>
  <line x1="50" y1="155" x2="70" y2="155" stroke="black" stroke-width="2"/>
  <line x1="55" y1="160" x2="65" y2="160" stroke="black" stroke-width="3"/>
  <text x="25" y="148" font-family="Arial" font-size="11" text-anchor="middle" fill="black">+</text>
  <text x="25" y="165" font-family="Arial" font-size="11" text-anchor="middle" fill="black">-</text>
  <text x="60" y="200" font-family="Arial" font-size="12" text-anchor="middle" fill="black">Battery</text>
  <!-- Bulb (top, center) -->
  <circle cx="200" cy="80" r="18" fill="none" stroke="black" stroke-width="2"/>
  <line x1="192" y1="88" x2="208" y2="72" stroke="black" stroke-width="1.5"/>
  <line x1="192" y1="72" x2="208" y2="88" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="62" x2="200" y2="55" stroke="black" stroke-width="2"/>
  <line x1="200" y1="98" x2="200" y2="105" stroke="black" stroke-width="2"/>
  <text x="200" y="115" font-family="Arial" font-size="12" text-anchor="middle" fill="black">Bulb 燈泡</text>
  <!-- Wire labels -->
  <text x="200" y="240" font-family="Arial" font-size="12" text-anchor="middle" fill="black">Wire 導線</text>
  <!-- Arrows showing current direction -->
  <polygon points="150,80 140,74 140,86" fill="black"/>
  <polygon points="250,220 260,214 260,226" fill="black"/>
</svg>
