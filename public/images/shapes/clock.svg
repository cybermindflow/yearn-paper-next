<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Clock face -->
  <circle cx="200" cy="150" r="110" fill="none" stroke="black" stroke-width="3"/>
  <circle cx="200" cy="150" r="105" fill="none" stroke="black" stroke-width="1"/>
  <!-- Hour markers -->
  <line x1="200" y1="45" x2="200" y2="58" stroke="black" stroke-width="3"/>
  <line x1="200" y1="242" x2="200" y2="255" stroke="black" stroke-width="3"/>
  <line x1="95" y1="150" x2="108" y2="150" stroke="black" stroke-width="3"/>
  <line x1="292" y1="150" x2="305" y2="150" stroke="black" stroke-width="3"/>
  <!-- Minor markers -->
  <line x1="255" y1="59" x2="249" y2="70" stroke="black" stroke-width="1.5"/>
  <line x1="295" y1="95" x2="285" y2="101" stroke="black" stroke-width="1.5"/>
  <line x1="305" y1="205" x2="294" y2="199" stroke="black" stroke-width="1.5"/>
  <line x1="255" y1="241" x2="249" y2="230" stroke="black" stroke-width="1.5"/>
  <line x1="145" y1="241" x2="151" y2="230" stroke="black" stroke-width="1.5"/>
  <line x1="95" y1="205" x2="106" y2="199" stroke="black" stroke-width="1.5"/>
  <line x1="105" y1="95" x2="115" y2="101" stroke="black" stroke-width="1.5"/>
  <line x1="145" y1="59" x2="151" y2="70" stroke="black" stroke-width="1.5"/>
  <!-- Hour numbers -->
  <text x="200" y="38" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold" fill="black">12</text>
  <text x="310" y="155" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold" fill="black">3</text>
  <text x="200" y="268" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold" fill="black">6</text>
  <text x="88" y="155" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold" fill="black">9</text>
  <text x="262" y="68" font-family="Arial" font-size="15" text-anchor="middle" fill="black">1</text>
  <text x="305" y="110" font-family="Arial" font-size="15" text-anchor="middle" fill="black">2</text>
  <text x="305" y="198" font-family="Arial" font-size="15" text-anchor="middle" fill="black">4</text>
  <text x="262" y="240" font-family="Arial" font-size="15" text-anchor="middle" fill="black">5</text>
  <text x="138" y="240" font-family="Arial" font-size="15" text-anchor="middle" fill="black">7</text>
  <text x="95" y="198" font-family="Arial" font-size="15" text-anchor="middle" fill="black">8</text>
  <text x="95" y="110" font-family="Arial" font-size="15" text-anchor="middle" fill="black">10</text>
  <text x="138" y="68" font-family="Arial" font-size="15" text-anchor="middle" fill="black">11</text>
  <!-- Hour hand (pointing to 3) -->
  <line x1="200" y1="150" x2="275" y2="150" stroke="black" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 12) -->
  <line x1="200" y1="150" x2="200" y2="65" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="200" cy="150" r="5" fill="black"/>
  <!-- Label -->
  <text x="200" y="295" font-family="Arial" font-size="13" text-anchor="middle" fill="black">時鐘顯示 3:00（三時正）</text>
</svg>
