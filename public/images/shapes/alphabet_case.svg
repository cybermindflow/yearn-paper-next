<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Title -->
  <text x="200" y="30" font-family="Arial" font-size="15" text-anchor="middle" font-weight="bold" fill="black">大寫 vs 小寫字母</text>
  <!-- Column headers -->
  <text x="100" y="60" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="black">大寫 (Capital)</text>
  <text x="300" y="60" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="black">小寫 (Lowercase)</text>
  <line x1="30" y1="65" x2="370" y2="65" stroke="black" stroke-width="1.5"/>
  <!-- Letter pairs -->
  <text x="100" y="95" font-family="Arial" font-size="22" text-anchor="middle" font-weight="bold" fill="black">A</text>
  <text x="300" y="95" font-family="Arial" font-size="22" text-anchor="middle" fill="black">a</text>
  <line x1="30" y1="102" x2="370" y2="102" stroke="black" stroke-width="0.8"/>
  <text x="100" y="130" font-family="Arial" font-size="22" text-anchor="middle" font-weight="bold" fill="black">B</text>
  <text x="300" y="130" font-family="Arial" font-size="22" text-anchor="middle" fill="black">b</text>
  <line x1="30" y1="137" x2="370" y2="137" stroke="black" stroke-width="0.8"/>
  <text x="100" y="165" font-family="Arial" font-size="22" text-anchor="middle" font-weight="bold" fill="black">C</text>
  <text x="300" y="165" font-family="Arial" font-size="22" text-anchor="middle" fill="black">c</text>
  <line x1="30" y1="172" x2="370" y2="172" stroke="black" stroke-width="0.8"/>
  <text x="100" y="200" font-family="Arial" font-size="22" text-anchor="middle" font-weight="bold" fill="black">D</text>
  <text x="300" y="200" font-family="Arial" font-size="22" text-anchor="middle" fill="black">d</text>
  <line x1="30" y1="207" x2="370" y2="207" stroke="black" stroke-width="0.8"/>
  <text x="100" y="235" font-family="Arial" font-size="22" text-anchor="middle" font-weight="bold" fill="black">E</text>
  <text x="300" y="235" font-family="Arial" font-size="22" text-anchor="middle" fill="black">e</text>
  <!-- Vertical divider -->
  <line x1="200" y1="45" x2="200" y2="250" stroke="black" stroke-width="1.5"/>
  <!-- Note -->
  <text x="200" y="275" font-family="Arial" font-size="11" text-anchor="middle" fill="black">大寫用於句首、人名、地名</text>
</svg>
