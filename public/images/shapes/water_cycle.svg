<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Sun top-right -->
  <circle cx="340" cy="45" r="22" fill="none" stroke="black" stroke-width="2"/>
  <line x1="340" y1="13" x2="340" y2="5" stroke="black" stroke-width="1.5"/>
  <line x1="340" y1="77" x2="340" y2="85" stroke="black" stroke-width="1.5"/>
  <line x1="308" y1="45" x2="300" y2="45" stroke="black" stroke-width="1.5"/>
  <line x1="372" y1="45" x2="380" y2="45" stroke="black" stroke-width="1.5"/>
  <line x1="317" y1="22" x2="311" y2="16" stroke="black" stroke-width="1.5"/>
  <line x1="363" y1="68" x2="369" y2="74" stroke="black" stroke-width="1.5"/>
  <text x="340" y="100" font-family="Arial" font-size="11" text-anchor="middle" fill="black">太陽</text>
  <!-- Cloud top-center -->
  <ellipse cx="180" cy="45" rx="45" ry="22" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="155" cy="55" rx="25" ry="18" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="205" cy="55" rx="25" ry="18" fill="none" stroke="black" stroke-width="2"/>
  <text x="180" y="30" font-family="Arial" font-size="11" text-anchor="middle" fill="black">雲</text>
  <!-- Evaporation arrow (up from ocean to cloud) -->
  <line x1="100" y1="200" x2="100" y2="80" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="100,75 94,90 106,90" fill="black"/>
  <text x="75" y="145" font-family="Arial" font-size="11" fill="black">蒸發</text>
  <!-- Rain arrows (down from cloud) -->
  <line x1="165" y1="75" x2="155" y2="200" stroke="black" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="154,205 148,192 160,192" fill="black"/>
  <line x1="180" y1="78" x2="180" y2="200" stroke="black" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="180,205 174,192 186,192" fill="black"/>
  <line x1="195" y1="75" x2="205" y2="200" stroke="black" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="206,205 200,192 212,192" fill="black"/>
  <text x="220" y="155" font-family="Arial" font-size="11" fill="black">降雨</text>
  <!-- Ocean/ground -->
  <rect x="40" y="210" width="320" height="50" fill="none" stroke="black" stroke-width="2"/>
  <path d="M 40,225 Q 80,215 120,225 Q 160,235 200,225 Q 240,215 280,225 Q 320,235 360,225" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="200" y="245" font-family="Arial" font-size="12" text-anchor="middle" fill="black">海洋 / 河流</text>
  <!-- River flow arrow -->
  <line x1="250" y1="210" x2="100" y2="210" stroke="black" stroke-width="1.5"/>
  <polygon points="97,210 110,204 110,216" fill="black"/>
  <text x="175" y="205" font-family="Arial" font-size="10" text-anchor="middle" fill="black">河流流回</text>
</svg>
