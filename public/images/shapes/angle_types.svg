<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Acute angle (left) -->
  <line x1="50" y1="220" x2="130" y2="220" stroke="black" stroke-width="2"/>
  <line x1="50" y1="220" x2="90" y2="120" stroke="black" stroke-width="2"/>
  <path d="M 80,220 A 30,30 0 0,1 66,192" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="90" y="215" font-family="Arial" font-size="11" fill="black">45°</text>
  <text x="90" y="255" font-family="Arial" font-size="13" text-anchor="middle" fill="black">銳角 (&lt;90°)</text>

  <!-- Right angle (center) -->
  <line x1="160" y1="220" x2="240" y2="220" stroke="black" stroke-width="2"/>
  <line x1="160" y1="220" x2="160" y2="120" stroke="black" stroke-width="2"/>
  <polyline points="160,200 180,200 180,220" fill="none" stroke="black" stroke-width="2"/>
  <text x="200" y="255" font-family="Arial" font-size="13" text-anchor="middle" fill="black">直角 (90°)</text>

  <!-- Obtuse angle (right) -->
  <line x1="270" y1="220" x2="380" y2="220" stroke="black" stroke-width="2"/>
  <line x1="380" y1="220" x2="310" y2="130" stroke="black" stroke-width="2"/>
  <path d="M 360,220 A 30,30 0 0,0 344,196" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="340" y="215" font-family="Arial" font-size="11" fill="black">120°</text>
  <text x="325" y="255" font-family="Arial" font-size="13" text-anchor="middle" fill="black">鈍角 (&gt;90°)</text>

  <!-- Title -->
  <text x="200" y="30" font-family="Arial" font-size="15" text-anchor="middle" font-weight="bold" fill="black">角度類型</text>
</svg>
