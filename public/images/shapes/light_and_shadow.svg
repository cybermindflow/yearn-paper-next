<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Light source (sun) on left -->
  <circle cx="55" cy="120" r="28" fill="none" stroke="black" stroke-width="2"/>
  <line x1="55" y1="82" x2="55" y2="70" stroke="black" stroke-width="1.5"/>
  <line x1="55" y1="158" x2="55" y2="170" stroke="black" stroke-width="1.5"/>
  <line x1="17" y1="120" x2="5" y2="120" stroke="black" stroke-width="1.5"/>
  <line x1="93" y1="120" x2="105" y2="120" stroke="black" stroke-width="1.5"/>
  <line x1="28" y1="93" x2="20" y2="85" stroke="black" stroke-width="1.5"/>
  <line x1="82" y1="147" x2="90" y2="155" stroke="black" stroke-width="1.5"/>
  <line x1="28" y1="147" x2="20" y2="155" stroke="black" stroke-width="1.5"/>
  <line x1="82" y1="93" x2="90" y2="85" stroke="black" stroke-width="1.5"/>
  <text x="55" y="190" font-family="Arial" font-size="12" text-anchor="middle" fill="black">光源</text>
  <!-- Light rays -->
  <line x1="83" y1="100" x2="175" y2="80" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="83" y1="140" x2="175" y2="160" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Opaque object (rectangle) in center -->
  <rect x="175" y="80" width="40" height="80" fill="white" stroke="black" stroke-width="2.5"/>
  <text x="195" y="175" font-family="Arial" font-size="11" text-anchor="middle" fill="black">不透明物體</text>
  <!-- Shadow on the right -->
  <polygon points="215,80 215,160 340,210 340,30" fill="none" stroke="black" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- Ground line -->
  <line x1="50" y1="220" x2="380" y2="220" stroke="black" stroke-width="2"/>
  <!-- Shadow fill indication -->
  <text x="290" y="200" font-family="Arial" font-size="12" text-anchor="middle" fill="black">陰影</text>
  <text x="290" y="215" font-family="Arial" font-size="10" text-anchor="middle" fill="black">（影子）</text>
</svg>
