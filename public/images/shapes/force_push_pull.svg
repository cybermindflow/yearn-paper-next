<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Left diagram: Push -->
  <!-- Person (stick figure) -->
  <circle cx="60" cy="120" r="12" fill="none" stroke="black" stroke-width="2"/>
  <line x1="60" y1="132" x2="60" y2="175" stroke="black" stroke-width="2"/>
  <line x1="60" y1="145" x2="40" y2="160" stroke="black" stroke-width="2"/>
  <line x1="60" y1="145" x2="90" y2="145" stroke="black" stroke-width="2"/>
  <line x1="60" y1="175" x2="45" y2="200" stroke="black" stroke-width="2"/>
  <line x1="60" y1="175" x2="75" y2="200" stroke="black" stroke-width="2"/>
  <!-- Box being pushed -->
  <rect x="110" y="145" width="55" height="55" fill="none" stroke="black" stroke-width="2.5"/>
  <!-- Push arrow -->
  <line x1="90" y1="155" x2="108" y2="155" stroke="black" stroke-width="2.5"/>
  <polygon points="112,155 100,149 100,161" fill="black"/>
  <!-- Direction arrow -->
  <line x1="168" y1="172" x2="195" y2="172" stroke="black" stroke-width="2"/>
  <polygon points="198,172 186,166 186,178" fill="black"/>
  <text x="90" y="230" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="black">推（Push）</text>

  <!-- Divider -->
  <line x1="200" y1="60" x2="200" y2="240" stroke="black" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Right diagram: Pull -->
  <!-- Box being pulled -->
  <rect x="230" y="145" width="55" height="55" fill="none" stroke="black" stroke-width="2.5"/>
  <!-- Person (stick figure) on right -->
  <circle cx="340" cy="120" r="12" fill="none" stroke="black" stroke-width="2"/>
  <line x1="340" y1="132" x2="340" y2="175" stroke="black" stroke-width="2"/>
  <line x1="340" y1="145" x2="310" y2="145" stroke="black" stroke-width="2"/>
  <line x1="340" y1="145" x2="360" y2="160" stroke="black" stroke-width="2"/>
  <line x1="340" y1="175" x2="325" y2="200" stroke="black" stroke-width="2"/>
  <line x1="340" y1="175" x2="355" y2="200" stroke="black" stroke-width="2"/>
  <!-- Pull arrow (from box toward person) -->
  <line x1="287" y1="155" x2="308" y2="155" stroke="black" stroke-width="2.5"/>
  <polygon points="285,155 297,149 297,161" fill="black"/>
  <!-- Direction arrow -->
  <line x1="205" y1="172" x2="228" y2="172" stroke="black" stroke-width="2"/>
  <polygon points="231,172 219,166 219,178" fill="black"/>
  <text x="310" y="230" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="black">拉（Pull）</text>
  <!-- Title -->
  <text x="200" y="40" font-family="Arial" font-size="15" text-anchor="middle" font-weight="bold" fill="black">力的作用：推與拉</text>
</svg>
