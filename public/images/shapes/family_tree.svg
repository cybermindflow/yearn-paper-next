<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Title -->
  <text x="200" y="28" font-family="Arial" font-size="15" text-anchor="middle" font-weight="bold" fill="black">家庭結構圖</text>
  <!-- Grandparents row -->
  <circle cx="100" cy="75" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="100" y="80" font-family="Arial" font-size="12" text-anchor="middle" fill="black">爺爺</text>
  <circle cx="160" cy="75" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="160" y="80" font-family="Arial" font-size="12" text-anchor="middle" fill="black">嫲嫲</text>
  <line x1="122" y1="75" x2="138" y2="75" stroke="black" stroke-width="2"/>
  <circle cx="240" cy="75" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="240" y="80" font-family="Arial" font-size="12" text-anchor="middle" fill="black">外公</text>
  <circle cx="300" cy="75" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="80" font-family="Arial" font-size="12" text-anchor="middle" fill="black">外婆</text>
  <line x1="262" y1="75" x2="278" y2="75" stroke="black" stroke-width="2"/>
  <!-- Lines down to parents -->
  <line x1="130" y1="97" x2="160" y2="140" stroke="black" stroke-width="1.5"/>
  <line x1="270" y1="97" x2="240" y2="140" stroke="black" stroke-width="1.5"/>
  <!-- Parents row -->
  <circle cx="150" cy="162" r="22" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="150" y="167" font-family="Arial" font-size="12" text-anchor="middle" fill="black">爸爸</text>
  <circle cx="250" cy="162" r="22" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="250" y="167" font-family="Arial" font-size="12" text-anchor="middle" fill="black">媽媽</text>
  <line x1="172" y1="162" x2="228" y2="162" stroke="black" stroke-width="2"/>
  <!-- Line down to children -->
  <line x1="200" y1="162" x2="200" y2="210" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="210" x2="130" y2="210" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="210" x2="270" y2="210" stroke="black" stroke-width="1.5"/>
  <!-- Children row -->
  <circle cx="130" cy="240" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="130" y="245" font-family="Arial" font-size="12" text-anchor="middle" fill="black">哥哥</text>
  <line x1="130" y1="210" x2="130" y2="218" stroke="black" stroke-width="1.5"/>
  <circle cx="200" cy="240" r="22" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="200" y="245" font-family="Arial" font-size="12" text-anchor="middle" fill="black">我</text>
  <line x1="200" y1="210" x2="200" y2="218" stroke="black" stroke-width="1.5"/>
  <circle cx="270" cy="240" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="270" y="245" font-family="Arial" font-size="12" text-anchor="middle" fill="black">妹妹</text>
  <line x1="270" y1="210" x2="270" y2="218" stroke="black" stroke-width="1.5"/>
  <!-- Label -->
  <text x="200" y="290" font-family="Arial" font-size="11" text-anchor="middle" fill="black">三代家庭結構示意圖</text>
</svg>
