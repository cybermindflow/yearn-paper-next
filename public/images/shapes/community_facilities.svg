<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- School (top-left) -->
  <rect x="20" y="50" width="80" height="70" fill="none" stroke="black" stroke-width="2"/>
  <polygon points="20,50 60,20 100,50" fill="none" stroke="black" stroke-width="2"/>
  <rect x="45" y="85" width="30" height="35" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="60" y1="85" x2="60" y2="120" stroke="black" stroke-width="1"/>
  <rect x="25" y="60" width="18" height="18" fill="none" stroke="black" stroke-width="1"/>
  <rect x="57" y="60" width="18" height="18" fill="none" stroke="black" stroke-width="1"/>
  <text x="60" y="140" font-family="Arial" font-size="11" text-anchor="middle" fill="black">學校</text>

  <!-- Park (top-right) -->
  <line x1="280" y1="110" x2="280" y2="60" stroke="black" stroke-width="2"/>
  <circle cx="280" cy="50" r="18" fill="none" stroke="black" stroke-width="2"/>
  <line x1="310" y1="110" x2="310" y2="65" stroke="black" stroke-width="2"/>
  <ellipse cx="310" cy="55" rx="15" ry="12" fill="none" stroke="black" stroke-width="2"/>
  <!-- Bench -->
  <line x1="330" y1="100" x2="370" y2="100" stroke="black" stroke-width="2.5"/>
  <line x1="335" y1="100" x2="335" y2="112" stroke="black" stroke-width="2"/>
  <line x1="365" y1="100" x2="365" y2="112" stroke="black" stroke-width="2"/>
  <text x="325" y="135" font-family="Arial" font-size="11" text-anchor="middle" fill="black">公園</text>

  <!-- Library (bottom-left) -->
  <rect x="20" y="175" width="80" height="65" fill="none" stroke="black" stroke-width="2"/>
  <polygon points="20,175 60,155 100,175" fill="none" stroke="black" stroke-width="2"/>
  <!-- Book shelves -->
  <line x1="35" y1="185" x2="35" y2="235" stroke="black" stroke-width="1"/>
  <line x1="55" y1="185" x2="55" y2="235" stroke="black" stroke-width="1"/>
  <line x1="75" y1="185" x2="75" y2="235" stroke="black" stroke-width="1"/>
  <line x1="20" y1="205" x2="100" y2="205" stroke="black" stroke-width="1"/>
  <text x="60" y="258" font-family="Arial" font-size="11" text-anchor="middle" fill="black">圖書館</text>

  <!-- Supermarket (bottom-right) -->
  <rect x="250" y="175" width="120" height="65" fill="none" stroke="black" stroke-width="2"/>
  <!-- Shelves -->
  <line x1="270" y1="185" x2="270" y2="235" stroke="black" stroke-width="1"/>
  <line x1="310" y1="185" x2="310" y2="235" stroke="black" stroke-width="1"/>
  <line x1="350" y1="185" x2="350" y2="235" stroke="black" stroke-width="1"/>
  <line x1="250" y1="205" x2="370" y2="205" stroke="black" stroke-width="1"/>
  <line x1="250" y1="220" x2="370" y2="220" stroke="black" stroke-width="1"/>
  <text x="310" y="258" font-family="Arial" font-size="11" text-anchor="middle" fill="black">超級市場</text>

  <!-- Title -->
  <text x="200" y="285" font-family="Arial" font-size="13" text-anchor="middle" font-weight="bold" fill="black">社區設施</text>
</svg>
