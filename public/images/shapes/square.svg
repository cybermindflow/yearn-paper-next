<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <rect x="100" y="50" width="200" height="200" fill="none" stroke="black" stroke-width="2.5"/>
  <!-- Right angle markers at all 4 corners -->
  <polyline points="100,70 120,70 120,50" fill="none" stroke="black" stroke-width="1.5"/>
  <polyline points="280,50 280,70 300,70" fill="none" stroke="black" stroke-width="1.5"/>
  <polyline points="300,230 280,230 280,250" fill="none" stroke="black" stroke-width="1.5"/>
  <polyline points="120,250 120,230 100,230" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Equal length tick marks -->
  <line x1="190" y1="44" x2="210" y2="44" stroke="black" stroke-width="2"/>
  <line x1="200" y1="38" x2="200" y2="50" stroke="black" stroke-width="2"/>
  <line x1="190" y1="256" x2="210" y2="256" stroke="black" stroke-width="2"/>
  <line x1="200" y1="250" x2="200" y2="262" stroke="black" stroke-width="2"/>
  <line x1="94" y1="140" x2="94" y2="160" stroke="black" stroke-width="2"/>
  <line x1="88" y1="150" x2="100" y2="150" stroke="black" stroke-width="2"/>
  <line x1="306" y1="140" x2="306" y2="160" stroke="black" stroke-width="2"/>
  <line x1="300" y1="150" x2="312" y2="150" stroke="black" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="290" font-family="Arial" font-size="16" text-anchor="middle" fill="black">正方形（四邊等長）</text>
</svg>
