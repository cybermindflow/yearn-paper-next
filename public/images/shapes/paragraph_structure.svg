<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Title -->
  <text x="200" y="28" font-family="Arial" font-size="15" text-anchor="middle" font-weight="bold" fill="black">段落結構 Paragraph Structure</text>
  <!-- Topic sentence box -->
  <rect x="30" y="45" width="340" height="45" rx="6" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="200" y="63" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold" fill="black">Topic Sentence 主題句</text>
  <text x="200" y="82" font-family="Arial" font-size="11" text-anchor="middle" fill="black">介紹段落的主要意思（第一句）</text>
  <!-- Arrow down -->
  <line x1="200" y1="90" x2="200" y2="105" stroke="black" stroke-width="2"/>
  <polygon points="200,108 194,98 206,98" fill="black"/>
  <!-- Supporting details box -->
  <rect x="30" y="108" width="340" height="55" rx="6" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="200" y="128" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold" fill="black">Supporting Details 支持細節</text>
  <text x="200" y="146" font-family="Arial" font-size="11" text-anchor="middle" fill="black">提供例子、原因、解釋</text>
  <text x="200" y="158" font-family="Arial" font-size="10" text-anchor="middle" fill="black">（中間幾句）</text>
  <!-- Arrow down -->
  <line x1="200" y1="163" x2="200" y2="178" stroke="black" stroke-width="2"/>
  <polygon points="200,181 194,171 206,171" fill="black"/>
  <!-- Concluding sentence box -->
  <rect x="30" y="181" width="340" height="45" rx="6" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="200" y="199" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold" fill="black">Concluding Sentence 結尾句</text>
  <text x="200" y="218" font-family="Arial" font-size="11" text-anchor="middle" fill="black">總結段落意思（最後一句）</text>
  <!-- Note -->
  <text x="200" y="260" font-family="Arial" font-size="11" text-anchor="middle" fill="black">每段必須有主題句 → 細節 → 結尾</text>
  <text x="200" y="278" font-family="Arial" font-size="10" text-anchor="middle" fill="black">閱讀時先看主題句，可快速掌握段落大意</text>
</svg>
