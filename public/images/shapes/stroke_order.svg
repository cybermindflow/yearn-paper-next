<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Character grid -->
  <rect x="100" y="30" width="200" height="200" fill="none" stroke="black" stroke-width="2"/>
  <!-- Grid lines -->
  <line x1="200" y1="30" x2="200" y2="230" stroke="black" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="100" y1="130" x2="300" y2="130" stroke="black" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- Character 山 with stroke numbers -->
  <!-- Stroke 1: left vertical -->
  <line x1="145" y1="80" x2="145" y2="190" stroke="black" stroke-width="4"/>
  <circle cx="145" cy="75" r="10" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="145" y="79" font-family="Arial" font-size="10" text-anchor="middle" fill="black">1</text>
  <!-- Stroke 2: bottom horizontal -->
  <line x1="120" y1="190" x2="280" y2="190" stroke="black" stroke-width="4"/>
  <circle cx="115" cy="190" r="10" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="115" y="194" font-family="Arial" font-size="10" text-anchor="middle" fill="black">2</text>
  <!-- Stroke 3: center vertical -->
  <line x1="200" y1="60" x2="200" y2="190" stroke="black" stroke-width="4"/>
  <circle cx="200" cy="55" r="10" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="200" y="59" font-family="Arial" font-size="10" text-anchor="middle" fill="black">3</text>
  <!-- Stroke 4: right vertical -->
  <line x1="255" y1="80" x2="255" y2="190" stroke="black" stroke-width="4"/>
  <circle cx="255" cy="75" r="10" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="255" y="79" font-family="Arial" font-size="10" text-anchor="middle" fill="black">4</text>
  <!-- Labels -->
  <text x="200" y="255" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="black">「山」字筆順示意</text>
  <text x="200" y="275" font-family="Arial" font-size="11" text-anchor="middle" fill="black">數字表示筆畫順序</text>
</svg>
