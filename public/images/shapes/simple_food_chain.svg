<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Sun -->
  <circle cx="45" cy="100" r="25" fill="none" stroke="black" stroke-width="2"/>
  <line x1="45" y1="65" x2="45" y2="55" stroke="black" stroke-width="1.5"/>
  <line x1="45" y1="135" x2="45" y2="145" stroke="black" stroke-width="1.5"/>
  <line x1="10" y1="100" x2="0" y2="100" stroke="black" stroke-width="1.5"/>
  <line x1="80" y1="100" x2="90" y2="100" stroke="black" stroke-width="1.5"/>
  <line x1="22" y1="77" x2="15" y2="70" stroke="black" stroke-width="1.5"/>
  <line x1="68" y1="123" x2="75" y2="130" stroke="black" stroke-width="1.5"/>
  <text x="45" y="165" font-family="Arial" font-size="12" text-anchor="middle" fill="black">太陽</text>
  <!-- Arrow 1 -->
  <line x1="75" y1="100" x2="105" y2="100" stroke="black" stroke-width="2"/>
  <polygon points="108,100 98,94 98,106" fill="black"/>
  <!-- Plant/Grass -->
  <line x1="130" y1="140" x2="130" y2="80" stroke="black" stroke-width="2"/>
  <ellipse cx="118" cy="95" rx="15" ry="10" fill="none" stroke="black" stroke-width="1.5" transform="rotate(-20,118,95)"/>
  <ellipse cx="142" cy="88" rx="15" ry="10" fill="none" stroke="black" stroke-width="1.5" transform="rotate(20,142,88)"/>
  <ellipse cx="130" cy="78" rx="12" ry="8" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="130" y="165" font-family="Arial" font-size="12" text-anchor="middle" fill="black">植物/草</text>
  <!-- Arrow 2 -->
  <line x1="155" y1="100" x2="185" y2="100" stroke="black" stroke-width="2"/>
  <polygon points="188,100 178,94 178,106" fill="black"/>
  <!-- Rabbit -->
  <ellipse cx="215" cy="110" rx="22" ry="16" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="215" cy="90" rx="12" ry="10" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="208" cy="75" rx="5" ry="12" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="222" cy="75" rx="5" ry="12" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="210" cy="88" r="2" fill="black"/>
  <circle cx="220" cy="88" r="2" fill="black"/>
  <text x="215" y="145" font-family="Arial" font-size="12" text-anchor="middle" fill="black">兔子</text>
  <!-- Arrow 3 -->
  <line x1="242" y1="100" x2="272" y2="100" stroke="black" stroke-width="2"/>
  <polygon points="275,100 265,94 265,106" fill="black"/>
  <!-- Fox -->
  <ellipse cx="320" cy="112" rx="30" ry="18" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="310" cy="92" rx="14" ry="12" fill="none" stroke="black" stroke-width="2"/>
  <polygon points="302,82 307,68 314,82" fill="none" stroke="black" stroke-width="1.5"/>
  <polygon points="316,82 321,68 328,82" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Fox tail -->
  <path d="M 350,112 Q 380,95 370,130 Q 360,145 345,130" fill="none" stroke="black" stroke-width="2"/>
  <text x="320" y="148" font-family="Arial" font-size="12" text-anchor="middle" fill="black">狐狸</text>
  <!-- Title -->
  <text x="200" y="285" font-family="Arial" font-size="13" text-anchor="middle" fill="black">食物鏈：太陽 → 植物 → 兔子 → 狐狸</text>
</svg>
