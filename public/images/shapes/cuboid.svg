<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Front face -->
  <rect x="80" y="120" width="180" height="120" fill="none" stroke="black" stroke-width="2.5"/>
  <!-- Top face (parallelogram) -->
  <polygon points="80,120 140,60 320,60 260,120" fill="none" stroke="black" stroke-width="2.5"/>
  <!-- Right face (parallelogram) -->
  <polygon points="260,120 320,60 320,180 260,240" fill="none" stroke="black" stroke-width="2.5"/>
  <!-- Hidden edges (dashed) -->
  <line x1="80" y1="240" x2="140" y2="180" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="140" y1="60" x2="140" y2="180" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="140" y1="180" x2="320" y2="180" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Dimension labels -->
  <!-- Length (bottom) -->
  <line x1="80" y1="255" x2="260" y2="255" stroke="black" stroke-width="1.5"/>
  <line x1="80" y1="248" x2="80" y2="262" stroke="black" stroke-width="1.5"/>
  <line x1="260" y1="248" x2="260" y2="262" stroke="black" stroke-width="1.5"/>
  <text x="170" y="272" font-family="Arial" font-size="13" text-anchor="middle" fill="black">長 (Length)</text>
  <!-- Width (right diagonal) -->
  <line x1="270" y1="245" x2="330" y2="185" stroke="black" stroke-width="1.5"/>
  <text x="320" y="235" font-family="Arial" font-size="13" text-anchor="middle" fill="black">寬</text>
  <!-- Height (right side) -->
  <line x1="340" y1="60" x2="340" y2="180" stroke="black" stroke-width="1.5"/>
  <line x1="333" y1="60" x2="347" y2="60" stroke="black" stroke-width="1.5"/>
  <line x1="333" y1="180" x2="347" y2="180" stroke="black" stroke-width="1.5"/>
  <text x="365" y="125" font-family="Arial" font-size="13" text-anchor="middle" fill="black">高</text>
  <!-- Title -->
  <text x="200" y="30" font-family="Arial" font-size="15" text-anchor="middle" font-weight="bold" fill="black">長方體 Cuboid</text>
</svg>
