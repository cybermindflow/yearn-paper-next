<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Sunny (top-left) -->
  <circle cx="70" cy="80" r="25" fill="none" stroke="black" stroke-width="2.5"/>
  <line x1="70" y1="45" x2="70" y2="35" stroke="black" stroke-width="2"/>
  <line x1="70" y1="115" x2="70" y2="125" stroke="black" stroke-width="2"/>
  <line x1="35" y1="80" x2="25" y2="80" stroke="black" stroke-width="2"/>
  <line x1="105" y1="80" x2="115" y2="80" stroke="black" stroke-width="2"/>
  <line x1="47" y1="57" x2="40" y2="50" stroke="black" stroke-width="2"/>
  <line x1="93" y1="103" x2="100" y2="110" stroke="black" stroke-width="2"/>
  <line x1="93" y1="57" x2="100" y2="50" stroke="black" stroke-width="2"/>
  <line x1="47" y1="103" x2="40" y2="110" stroke="black" stroke-width="2"/>
  <text x="70" y="148" font-family="Arial" font-size="12" text-anchor="middle" fill="black">晴天</text>

  <!-- Rainy (top-right) -->
  <ellipse cx="290" cy="65" rx="45" ry="22" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="265" cy="75" rx="25" ry="18" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="315" cy="75" rx="25" ry="18" fill="none" stroke="black" stroke-width="2"/>
  <!-- Rain drops -->
  <line x1="265" y1="100" x2="258" y2="120" stroke="black" stroke-width="1.5"/>
  <line x1="280" y1="100" x2="273" y2="120" stroke="black" stroke-width="1.5"/>
  <line x1="295" y1="100" x2="288" y2="120" stroke="black" stroke-width="1.5"/>
  <line x1="310" y1="100" x2="303" y2="120" stroke="black" stroke-width="1.5"/>
  <line x1="325" y1="100" x2="318" y2="120" stroke="black" stroke-width="1.5"/>
  <text x="290" y="148" font-family="Arial" font-size="12" text-anchor="middle" fill="black">雨天</text>

  <!-- Cloudy (bottom-left) -->
  <ellipse cx="70" cy="205" rx="45" ry="22" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="45" cy="215" rx="25" ry="18" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="95" cy="215" rx="25" ry="18" fill="none" stroke="black" stroke-width="2"/>
  <text x="70" y="255" font-family="Arial" font-size="12" text-anchor="middle" fill="black">陰天</text>

  <!-- Windy (bottom-right) -->
  <ellipse cx="285" cy="195" rx="40" ry="18" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="265" cy="205" rx="22" ry="15" fill="none" stroke="black" stroke-width="2"/>
  <!-- Wind lines -->
  <path d="M 250,225 Q 270,215 290,225 Q 310,235 330,225" fill="none" stroke="black" stroke-width="2"/>
  <path d="M 255,238 Q 275,228 295,238 Q 315,248 335,238" fill="none" stroke="black" stroke-width="2"/>
  <polygon points="250,225 262,219 262,231" fill="black"/>
  <polygon points="255,238 267,232 267,244" fill="black"/>
  <text x="290" y="265" font-family="Arial" font-size="12" text-anchor="middle" fill="black">大風</text>

  <!-- Dividers -->
  <line x1="200" y1="20" x2="200" y2="280" stroke="black" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="20" y1="165" x2="380" y2="165" stroke="black" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- Title -->
  <text x="200" y="290" font-family="Arial" font-size="13" text-anchor="middle" font-weight="bold" fill="black">天氣符號</text>
</svg>
