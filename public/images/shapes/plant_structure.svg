<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:white">
  <!-- Ground line -->
  <line x1="40" y1="210" x2="360" y2="210" stroke="black" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Roots -->
  <line x1="200" y1="210" x2="180" y2="250" stroke="black" stroke-width="2"/>
  <line x1="200" y1="210" x2="200" y2="260" stroke="black" stroke-width="2"/>
  <line x1="200" y1="210" x2="220" y2="250" stroke="black" stroke-width="2"/>
  <line x1="180" y1="250" x2="165" y2="270" stroke="black" stroke-width="1.5"/>
  <line x1="180" y1="250" x2="185" y2="272" stroke="black" stroke-width="1.5"/>
  <line x1="220" y1="250" x2="215" y2="272" stroke="black" stroke-width="1.5"/>
  <line x1="220" y1="250" x2="235" y2="270" stroke="black" stroke-width="1.5"/>
  <!-- Stem -->
  <line x1="200" y1="210" x2="200" y2="80" stroke="black" stroke-width="3"/>
  <!-- Left leaf -->
  <ellipse cx="160" cy="150" rx="35" ry="18" fill="none" stroke="black" stroke-width="2" transform="rotate(-30,160,150)"/>
  <line x1="200" y1="155" x2="165" y2="148" stroke="black" stroke-width="1.5"/>
  <!-- Right leaf -->
  <ellipse cx="240" cy="130" rx="35" ry="18" fill="none" stroke="black" stroke-width="2" transform="rotate(30,240,130)"/>
  <line x1="200" y1="130" x2="235" y2="128" stroke="black" stroke-width="1.5"/>
  <!-- Flower at top -->
  <circle cx="200" cy="65" r="15" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="200" cy="45" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="218" cy="55" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="218" cy="75" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="200" cy="85" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="182" cy="75" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="182" cy="55" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="290" y="65" font-family="Arial" font-size="12" fill="black">← 花</text>
  <text x="290" y="135" font-family="Arial" font-size="12" fill="black">← 葉</text>
  <text x="290" y="175" font-family="Arial" font-size="12" fill="black">← 莖</text>
  <text x="290" y="265" font-family="Arial" font-size="12" fill="black">← 根</text>
  <line x1="215" y1="65" x2="285" y2="65" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="240" y1="130" x2="285" y2="132" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="210" y1="175" x2="285" y2="175" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="210" y1="255" x2="285" y2="262" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
